services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
      - node_modules:/workspace/node_modules
    command: sleep infinity
    privileged: true
    networks:
      - devcontainer-net
    depends_on:
      - db
      - redis
    # ts-node compilation + 20+ BDD scenarios + VS Code language servers need
    # significant headroom. Capping here prevents OOM from taking down the
    # entire Docker Desktop VM.
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - devcontainer-net
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
        reservations:
          memory: 64M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass redis_password
    volumes:
      - redis-data:/data
    networks:
      - devcontainer-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          memory: 32M

networks:
  devcontainer-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  node_modules:
