services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
      - node_modules:/workspace/node_modules
    command: sleep infinity
    privileged: true
    networks:
      - devcontainer-net
    depends_on:
      - db
      - redis
    # Sized for running 2-3 devcontainers simultaneously on a 7.43 GB Docker
    # Desktop allocation (16 CPU host).
    #
    # Memory is the hard limit; CPU limits are soft (Docker shares fairly under
    # contention — setting them higher than available CPUs is fine).
    #
    #   3 projects × (2G app + 128M db + 64M redis) ≈ 6.6G
    #   + ~300M daemon                               ≈ 6.9G  < 7.43G ✓
    #
    # If you only ever run one project at a time you can raise app to 4–5G.
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - devcontainer-net
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 64M
        reservations:
          memory: 16M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass redis_password
    volumes:
      - redis-data:/data
    networks:
      - devcontainer-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 64M
        reservations:
          memory: 16M

networks:
  devcontainer-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  node_modules:
