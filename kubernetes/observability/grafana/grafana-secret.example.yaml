# Grafana admin password Secret — EXAMPLE / TEMPLATE
#
# DO NOT commit a real grafana-secret.yaml to git.
# This file is committed as documentation only; the real secret is gitignored.
#
# To create the real Secret before deploying Grafana:
#
#   Option 1 — kubectl (recommended, secret never touches the filesystem):
#     kubectl create secret generic grafana-secret \
#       --namespace observability \
#       --from-literal=admin-password='<your-strong-password>'
#     # Tip: generate a random password with: openssl rand -base64 24
#
#   Option 2 — apply a local manifest (never committed):
#     1. Copy this file:  cp grafana-secret.example.yaml grafana-secret.yaml
#     2. Replace the placeholder value with a real base64-encoded password:
#        echo -n '<your-strong-password>' | base64
#     3. kubectl apply -f grafana-secret.yaml
#     4. Delete the local copy immediately — do NOT commit it.
#
#   Option 3 — ExternalSecrets Operator or Vault Agent Injector (production):
#     Configure your ESO ClusterSecretStore / VaultAgentInjector to populate
#     a Secret named "grafana-secret" with key "admin-password".
#
# The Grafana Deployment expects:
#   Secret name : grafana-secret
#   Key         : admin-password
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secret
  namespace: observability
  labels:
    app: grafana
    component: monitoring
type: Opaque
data:
  # Replace with: echo -n '<your-strong-password>' | base64
  admin-password: <base64-encoded-password-here>
