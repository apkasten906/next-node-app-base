# Grafana admin password Secret
# SECURITY: Do NOT commit real credentials. Replace the value below before deploying.
# Generate a strong password and base64-encode it:
#   echo -n "your-strong-password" | base64
# Or create the secret imperatively (recommended — never stored in git):
#   kubectl create secret generic grafana-secret \
#     --namespace observability \
#     --from-literal=admin-password='<your-secure-password>'
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secret
  namespace: observability
  labels:
    app: grafana
    component: monitoring
type: Opaque
data:
  # Placeholder: "changeme" — REPLACE before deploying to any environment
  admin-password: Y2hhbmdlbWU=
