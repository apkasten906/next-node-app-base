# Loki ConfigMap — single-binary (monolithic) mode
#
# Suitable for development and staging clusters.
# For production, switch to the microservices deployment mode backed by
# object storage (GCS, S3, or Azure Blob) and remove the filesystem stanzas.
#
# Port: 3100 (HTTP API + push endpoint used by Promtail and Grafana)
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: observability
  labels:
    app: loki
    component: logging
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9096
      log_level: warn

    common:
      instance_addr: 0.0.0.0
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    limits_config:
      reject_old_samples: true
      reject_old_samples_max_age: 168h  # 7 days
      # Retention is enforced by the compactor; 31-day default suits dev/staging.
      retention_period: 744h

    compactor:
      working_directory: /loki/compactor
      retention_enabled: true
      delete_request_store: filesystem

    ingester:
      chunk_idle_period: 10m
      chunk_retain_period: 30s
      max_transfer_retries: 0
      wal:
        enabled: true
        dir: /loki/wal

    query_range:
      results_cache:
        cache:
          embedded_cache:
            enabled: true
            max_size_mb: 100

    analytics:
      reporting_enabled: false
